host = "0.0.0.0"
port = 3000
log_level = "info"

[runtime]
# Tokio runtime configuration for non-critical async tasks
# This runtime is used for telemetry, signal handling, and future app-layer tasks
# Network I/O workers run on native threads, not on this runtime
# worker_threads = 2
# max_blocking_threads = 8
# thread_name = "tokio-worker"
# thread_stack_size = 2097152  # 2 MB

[telemetry]
# otlp_endpoint = "http://localhost:4317"
# service_name = "quicd"
# enable_metrics = true
# enable_tracing = false
# export_interval_secs = 60

[netio]
# Number of worker threads (defaults to number of CPU cores)
# workers = 2
# Enable SO_REUSEPORT for kernel-level load distribution
reuse_port = true
# Pin worker threads to CPU cores for cache locality
pin_to_cpu = true
# Number of io_uring submission queue entries per worker (must be power of 2)
# Higher values allow more in-flight operations but consume more memory
uring_entries = 2048
# Kernel socket receive buffer size in bytes (SO_RCVBUF)
# Larger buffers reduce packet loss under burst traffic
socket_recv_buffer_size = 33554432  # 32 MB
# Kernel socket send buffer size in bytes (SO_SNDBUF)
# Larger buffers improve throughput for high-rate sending
socket_send_buffer_size = 33554432  # 32 MB

[netio.buffer_pool]
# Maximum number of buffers in each worker's pool
# Each worker has its own isolated pool - no sharing between workers
# Total memory = workers × max_buffers_per_worker × datagram_size (approximately)
max_buffers_per_worker = 16384
# Target size for datagrams (actual buffers can grow larger if needed)
# Standard QUIC datagram size for good MTU compatibility
datagram_size = 1350

[quic]
# TLS certificate and key paths for QUIC connection encryption
# If not provided, uses self-signed certificates (NOT for production)
# cert_path = "/home/abhay/quicd/certs/cert.pem"
# key_path = "/home/abhay/quicd/certs/key.pem"
# Transport parameters
max_idle_timeout_ms = 30000
initial_rtt_ms = 100
max_streams_bidi = 100
max_streams_uni = 100
max_udp_payload_size = 1350
recv_window = 10485760  # 10 MB
stream_recv_window = 1048576  # 1 MB
congestion_control = "cubic"
disable_active_migration = false
enable_pacing = true
enable_version_negotiation = true
enable_dgram = false
max_dgram_size = 1350
enable_stats = true