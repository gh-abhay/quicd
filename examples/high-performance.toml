# High-Performance quicd Configuration
#
# Optimized for maximum throughput on high-end hardware.

[global.network]
host = "0.0.0.0"
port = 443

[global.runtime]
worker_threads = 16
max_blocking_threads = 1024

[global.logging]
level = "warn"  # Reduce logging overhead

[global.quic]
max_streams_bidi = 1000
max_streams_uni = 1000
recv_window = 104857600  # 100 MB
stream_recv_window = 10485760  # 10 MB
congestion_control = "bbr2"
enable_pacing = true
max_connections_per_worker = 100000

[global.netio]
workers = 16
pin_to_cpu = true
uring_entries = 4096
enable_gro = true
enable_gso = true

[global.netio.buffer_pool]
max_buffers_per_worker = 8192

[global.channels]
worker_egress_capacity = 8192
connection_ingress_capacity = 4096
stream_ingress_capacity = 512
stream_egress_capacity = 512

# HTTP/3 with high-throughput preset
[[applications]]
alpn = "h3"
type = "http3"
max_frame_size = 67108864  # 64 MB
max_field_section_size = 262144  # 256 KB
qpack_max_table_capacity = 16384  # 16 KB
qpack_blocked_streams = 500
max_concurrent_streams = 1000
stream_buffer_initial_capacity = 65536  # 64 KB
stream_buffer_max_size = 8388608  # 8 MB
qpack_encoder_instruction_batch_size = 32
qpack_decoder_instruction_batch_size = 32
